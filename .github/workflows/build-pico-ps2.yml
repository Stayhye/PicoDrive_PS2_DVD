name: Picodrive CI
on: [push, pull_request]
jobs:

  build-ps2:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev
    
    steps:
    
    - name: build environment
      run: |
        apk add build-base cmake git zip make
    - uses: actions/checkout@v4
      with:
        submodules: true
        
    - name: Prepare Embedded IRX
      run: |
        # Convert IRX binaries to C arrays
        bin2c $PS2SDK/iop/irx/audsrv.irx audsrv_irx.c audsrv_irx
        bin2c $PS2SDK/iop/irx/libsd.irx libsd_irx.c libsd_irx
        
    - name: build
      run: |
        export CROSS_COMPILE=mips64r5900el-ps2-elf-
        git config --global --add safe.directory $PWD
        ver=$(cut -d'"' -f2 platform/common/version.h)-$(git rev-parse --short HEAD)
        ./configure --platform=ps2
        make -j$(getconf _NPROCESSORS_ONLN)
        # This creates the release directory
        make -C platform/ps2 rel VER=$ver

    - name: Bundle IRX Drivers and Music
      run: |
        # 1. Identify the zip file
        ZIP_FILE=$(ls PicoDrive_ps2_*.zip)
        
        # 2. Unzip it (This creates a folder named 'PicoDrive' based on your logs)
        unzip "$ZIP_FILE"
        
        # 3. Define the internal folder name from the unzip log
        INTERNAL_DIR="PicoDrive"
        
        # 4. Create IRX folder and copy drivers from SDK
        mkdir -p "$INTERNAL_DIR/irx"
        cp $PS2SDK/iop/irx/audsrv.irx "$INTERNAL_DIR/irx/"
        cp $PS2SDK/iop/irx/libsd.irx "$INTERNAL_DIR/irx/"
        
        # 5. Copy your music (assumes menu.wav is in repo root)
        if [ -f "menu.wav" ]; then
          cp menu.wav "$INTERNAL_DIR/"
        else
          echo "Warning: menu.wav not found, menu will be silent!"
        fi
        
        # 6. Remove the old zip and create a new one with the updated PicoDrive folder
        rm "$ZIP_FILE"
        zip -r "$ZIP_FILE" "$INTERNAL_DIR"

    - name: artifacts
      uses: actions/upload-artifact@v4
      with:
        name: PS2
        path: PicoDrive_ps2_*.zip
