name: Picodrive CI
on: [push, pull_request]
jobs:

  build-ps2:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev
    steps:
    - name: build environment
      run: |
        apk add build-base cmake git zip make
    - uses: actions/checkout@v4
      with:
        submodules: true
    - name: build
      run: |
        export CROSS_COMPILE=mips64r5900el-ps2-elf-
        git config --global --add safe.directory $PWD
        ver=$(cut -d'"' -f2 platform/common/version.h)-$(git rev-parse --short HEAD)
        ./configure --platform=ps2
        make -j$(getconf _NPROCESSORS_ONLN)
        # This creates the release directory
        make -C platform/ps2 rel VER=$ver

    - name: Bundle IRX Drivers and Music
      run: |
        # Identify the zip file and folder name
        ZIP_FILE=$(ls PicoDrive_ps2_*.zip)
        DIR_NAME="${ZIP_FILE%.zip}"
        
        # Unzip the existing artifact
        unzip "$ZIP_FILE"
        
        # 1. Create IRX folder and copy drivers
        mkdir -p "$DIR_NAME/irx"
        cp $PS2SDK/iop/irx/audsrv.irx "$DIR_NAME/irx/"
        cp $PS2SDK/iop/irx/libsd.irx "$DIR_NAME/irx/"
        
        # 2. Copy the ELF file (The missing piece!)
        cp PicoDrive.elf "$DIR_NAME/"
        
        # 3. Copy your music (assumes menu.wav is in repo root)
        if [ -f "menu.wav" ]; then
          cp menu.wav "$DIR_NAME/"
        fi
        
        # Remove old zip and create new one containing the ELF and IRX/WAV
        rm "$ZIP_FILE"
        zip -r "$ZIP_FILE" "$DIR_NAME"

    - name: artifacts
      uses: actions/upload-artifact@v4
      with:
        name: PS2
        path: PicoDrive_ps2_*.zip
